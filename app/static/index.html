<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Control Panel - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@radix-ui/colors@latest/slate.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@radix-ui/colors@latest/blue.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@radix-ui/colors@latest/green.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@radix-ui/colors@latest/red.css">
    <link rel="stylesheet" href="/static/css/index.css">
</head>

<body class="min-h-screen bg-slate-950">
    <header class="bg-slate-900 border-b border-slate-800 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <svg class="h-8 w-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <h1 class="ml-3 text-xl font-semibold text-slate-100">TV Control Panel</h1>
                </div>
                <nav class="flex space-x-4">
                    <a href="/" class="px-3 py-2 rounded-md text-sm font-medium text-blue-400 bg-blue-950/50">Home</a>
                    <a href="/status.html"
                        class="px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-slate-100 hover:bg-slate-800 transition-colors">Status</a>
                    <a href="/debug.html"
                        class="px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-slate-100 hover:bg-slate-800 transition-colors">Debug</a>
                    <a href="http://10.10.97.83:8080/" target="_blank"
                        class="px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-slate-100 hover:bg-slate-800 transition-colors">Resolume</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Resolume Section -->
        <div class="mb-6">
            <div class="bg-slate-900 rounded-lg p-4 border border-slate-800">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-lg font-semibold text-slate-100">Resolume Control</h3>
                    <button onclick="loadResolumeData()" 
                        class="px-3 py-1 text-xs font-medium rounded text-white bg-slate-700 hover:bg-slate-600 transition-colors">
                        Refresh
                    </button>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <!-- Thumbnail Display -->
                    <div>
                        <div class="text-xs font-semibold text-slate-300 mb-2">Current Output (Layer <span id="current-layer">1</span>)</div>
                        <div id="thumbnail-container" class="relative bg-slate-950 rounded overflow-hidden" style="aspect-ratio: 16/9;">
                            <img id="thumbnail-image" 
                                class="w-full h-full object-contain" 
                                alt="Resolume Thumbnail">
                            <div id="thumbnail-loading" class="absolute inset-0 flex items-center justify-center">
                                <div class="text-slate-500 text-xs">Loading...</div>
                            </div>
                            <div id="thumbnail-error" class="absolute inset-0 flex items-center justify-center hidden">
                                <div class="text-red-400 text-xs">Failed to load</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Layer & Clip Controls -->
                    <div class="space-y-3">
                        <div>
                            <label class="text-xs font-semibold text-slate-300 mb-2 block">Select Layer</label>
                            <select id="layer-select" onchange="onLayerChange()" 
                                class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-md text-sm text-slate-100">
                                <option value="">Loading layers...</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="text-xs font-semibold text-slate-300 mb-2 block">Select Clip</label>
                            <select id="clip-select" 
                                class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-md text-sm text-slate-100">
                                <option value="">Select a layer first</option>
                            </select>
                        </div>
                        
                        <div class="flex gap-2">
                            <button onclick="activateSelectedLayer()" 
                                class="flex-1 px-3 py-2 text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                                Activate Layer
                            </button>
                            <button onclick="triggerSelectedClip()" 
                                class="flex-1 px-3 py-2 text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 transition-colors">
                                Trigger Clip
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Global Remote Control -->
        <div class="mb-6">
            <div class="bg-slate-900 rounded-lg p-4 border border-slate-800">
                <h3 class="text-lg font-semibold text-slate-100 mb-3">Global Remote Control</h3>
                <div class="text-xs text-slate-400 mb-3">Send commands to all TVs simultaneously</div>
                <div class="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2">
                    <button onclick="sendGlobalKey('KEY_POWER')" class="remote-btn bg-red-600 hover:bg-red-700">Power</button>
                    <button onclick="sendGlobalKey('KEY_MUTE')" class="remote-btn bg-orange-600 hover:bg-orange-700">Mute</button>
                    <button onclick="sendGlobalKey('KEY_VOLUP')" class="remote-btn bg-blue-600 hover:bg-blue-700">Vol+</button>
                    <button onclick="sendGlobalKey('KEY_VOLDOWN')" class="remote-btn bg-blue-600 hover:bg-blue-700">Vol-</button>
                    <button onclick="sendGlobalKey('KEY_CHUP')" class="remote-btn bg-purple-600 hover:bg-purple-700">Ch+</button>
                    <button onclick="sendGlobalKey('KEY_CHDOWN')" class="remote-btn bg-purple-600 hover:bg-purple-700">Ch-</button>
                    <button onclick="sendGlobalKey('KEY_UP')" class="remote-btn bg-slate-600 hover:bg-slate-700">Up</button>
                    <button onclick="sendGlobalKey('KEY_DOWN')" class="remote-btn bg-slate-600 hover:bg-slate-700">Down</button>
                    <button onclick="sendGlobalKey('KEY_LEFT')" class="remote-btn bg-slate-600 hover:bg-slate-700">Left</button>
                    <button onclick="sendGlobalKey('KEY_RIGHT')" class="remote-btn bg-slate-600 hover:bg-slate-700">Right</button>
                    <button onclick="sendGlobalKey('KEY_ENTER')" class="remote-btn bg-green-600 hover:bg-green-700">Enter</button>
                    <button onclick="sendGlobalKey('KEY_RETURN')" class="remote-btn bg-slate-600 hover:bg-slate-700">Back</button>
                    <button onclick="sendGlobalKey('KEY_HOME')" class="remote-btn bg-blue-600 hover:bg-blue-700">Home</button>
                    <button onclick="sendGlobalKey('KEY_MENU')" class="remote-btn bg-blue-600 hover:bg-blue-700">Menu</button>
                    <button onclick="sendGlobalKey('KEY_SOURCE')" class="remote-btn bg-purple-600 hover:bg-purple-700">Source</button>
                    <button onclick="sendGlobalKey('KEY_INFO')" class="remote-btn bg-slate-600 hover:bg-slate-700">Info</button>
                </div>
            </div>
        </div>

        <div class="mb-6 flex items-center justify-between">
            <h2 class="text-2xl font-bold text-slate-100">TV Grid</h2>
            <div class="flex items-center gap-3">
                <button onclick="refreshNow()" id="btnRefresh"
                    class="px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Refresh
                </button>
            </div>
        </div>

        <div id="tv-grid" class="grid grid-cols-5 gap-4">
            <!-- TV cards will be populated here by JavaScript -->
        </div>

        <div id="loading" class="text-center py-16">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
            <p class="mt-4 text-sm text-slate-400">Loading TVs...</p>
        </div>
    </main>

    <!-- Individual TV Remote Modal -->
    <div id="tv-remote-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50" onclick="closeRemoteModal(event)">
        <div class="bg-slate-900 rounded-lg shadow-xl max-w-md w-full mx-4 border border-slate-800" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between p-4 border-b border-slate-800">
                <h3 class="text-lg font-semibold text-slate-100" id="remote-modal-title">TV Remote</h3>
                <button onclick="closeRemoteModal()" class="text-slate-400 hover:text-slate-100">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-4">
                <div class="grid grid-cols-3 gap-2">
                    <!-- Power & Volume Row -->
                    <button onclick="sendIndividualKey('KEY_POWER')" class="remote-btn bg-red-600 hover:bg-red-700 col-span-3">Power</button>
                    <button onclick="sendIndividualKey('KEY_MUTE')" class="remote-btn bg-orange-600 hover:bg-orange-700">Mute</button>
                    <button onclick="sendIndividualKey('KEY_VOLUP')" class="remote-btn bg-blue-600 hover:bg-blue-700">Vol+</button>
                    <button onclick="sendIndividualKey('KEY_VOLDOWN')" class="remote-btn bg-blue-600 hover:bg-blue-700">Vol-</button>
                    
                    <!-- Navigation -->
                    <div class="col-span-3 grid grid-cols-3 gap-2 my-2">
                        <div></div>
                        <button onclick="sendIndividualKey('KEY_UP')" class="remote-btn bg-slate-600 hover:bg-slate-700">↑</button>
                        <div></div>
                        <button onclick="sendIndividualKey('KEY_LEFT')" class="remote-btn bg-slate-600 hover:bg-slate-700">←</button>
                        <button onclick="sendIndividualKey('KEY_ENTER')" class="remote-btn bg-green-600 hover:bg-green-700">OK</button>
                        <button onclick="sendIndividualKey('KEY_RIGHT')" class="remote-btn bg-slate-600 hover:bg-slate-700">→</button>
                        <div></div>
                        <button onclick="sendIndividualKey('KEY_DOWN')" class="remote-btn bg-slate-600 hover:bg-slate-700">↓</button>
                        <div></div>
                    </div>
                    
                    <!-- Function Keys -->
                    <button onclick="sendIndividualKey('KEY_RETURN')" class="remote-btn bg-slate-600 hover:bg-slate-700">Back</button>
                    <button onclick="sendIndividualKey('KEY_HOME')" class="remote-btn bg-blue-600 hover:bg-blue-700">Home</button>
                    <button onclick="sendIndividualKey('KEY_MENU')" class="remote-btn bg-blue-600 hover:bg-blue-700">Menu</button>
                    
                    <!-- Channel & Source -->
                    <button onclick="sendIndividualKey('KEY_CHUP')" class="remote-btn bg-purple-600 hover:bg-purple-700">Ch+</button>
                    <button onclick="sendIndividualKey('KEY_SOURCE')" class="remote-btn bg-purple-600 hover:bg-purple-700">Source</button>
                    <button onclick="sendIndividualKey('KEY_CHDOWN')" class="remote-btn bg-purple-600 hover:bg-purple-700">Ch-</button>
                    
                    <!-- Playback Controls -->
                    <button onclick="sendIndividualKey('KEY_PLAY')" class="remote-btn bg-green-600 hover:bg-green-700">Play</button>
                    <button onclick="sendIndividualKey('KEY_PAUSE')" class="remote-btn bg-yellow-600 hover:bg-yellow-700">Pause</button>
                    <button onclick="sendIndividualKey('KEY_STOP')" class="remote-btn bg-red-600 hover:bg-red-700">Stop</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-auto bg-slate-900 border-t border-slate-800">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex items-center justify-between">
                <p class="text-sm text-slate-500">
                    &copy; 2026 TV Control Panel. Built with FastAPI & Tailwind CSS.
                </p>
                <div class="flex space-x-4 text-sm text-slate-500">
                    <a href="https://github.com" class="hover:text-slate-300 transition-colors">GitHub</a>
                    <a href="/api/tvs" class="hover:text-slate-300 transition-colors">API</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="/static/js/index.js"></script>

    <noscript>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="bg-red-900/30 border border-red-800 rounded-lg p-4">
                <p class="text-red-400">JavaScript is required for this page to function.</p>
            </div>
        </div>
    </noscript>
</body>

</html>
