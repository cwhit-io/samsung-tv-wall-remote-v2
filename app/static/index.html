<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Control Panel - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@radix-ui/colors@latest/slate.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@radix-ui/colors@latest/blue.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@radix-ui/colors@latest/green.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@radix-ui/colors@latest/red.css">
    <link rel="stylesheet" href="/legacy-static/css/index.css">
</head>

<body class="min-h-screen bg-slate-950">
    <header class="bg-slate-900 border-b border-slate-800 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <svg class="h-8 w-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <h1 class="ml-3 text-xl font-semibold text-slate-100">TV Control Panel</h1>
                </div>
                <nav class="flex space-x-4">
                    <a href="/legacy" class="px-3 py-2 rounded-md text-sm font-medium text-blue-400 bg-blue-950/50">Home</a>
                    <a href="/legacy/status.html"
                        class="px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-slate-100 hover:bg-slate-800 transition-colors">Status</a>
                    <a href="/legacy/debug.html"
                        class="px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-slate-100 hover:bg-slate-800 transition-colors">Debug</a>
                    <a href="http://10.10.97.83:8080/" target="_blank"
                        class="px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-slate-100 hover:bg-slate-800 transition-colors">Resolume</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6 flex items-center justify-between">
            <h2 class="text-2xl font-bold text-slate-100">TV Grid</h2>
            <div class="flex items-center gap-3">
                <button onclick="openGlobalRemote()" 
                    class="px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition-colors flex items-center gap-2">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    Global Remote
                </button>
                <button onclick="refreshNow()" id="btnRefresh"
                    class="px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Refresh
                </button>
            </div>
        </div>

        <div id="tv-grid" class="grid grid-cols-5 gap-4">
            <!-- TV cards will be populated here by JavaScript -->
        </div>

        <div id="loading" class="text-center py-16">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
            <p class="mt-4 text-sm text-slate-400">Loading TVs...</p>
        </div>

        <!-- Resolume Section -->
        <div class="mt-8">
            <div class="bg-slate-900 rounded-lg p-4 border border-slate-800">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-lg font-semibold text-slate-100">Resolume Control</h3>
                    <button onclick="loadResolumeColumns()" 
                        class="px-3 py-1 text-xs font-medium rounded text-white bg-slate-700 hover:bg-slate-600 transition-colors">
                        Refresh
                    </button>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <!-- Thumbnail Display -->
                    <div>
                        <div class="text-xs font-semibold text-slate-300 mb-2">Current Output (Layer <span id="current-layer">1</span>)</div>
                        <div id="thumbnail-container" class="relative bg-slate-950 rounded overflow-hidden" style="aspect-ratio: 16/9;">
                            <img id="thumbnail-image" 
                                class="w-full h-full object-contain" 
                                alt="Resolume Thumbnail">
                            <div id="thumbnail-loading" class="absolute inset-0 flex items-center justify-center">
                                <div class="text-slate-500 text-xs">Loading...</div>
                            </div>
                            <div id="thumbnail-error" class="absolute inset-0 flex items-center justify-center hidden">
                                <div class="text-red-400 text-xs">Failed to load</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Column Controls -->
                    <div class="space-y-3">
                        <div>
                            <label class="text-xs font-semibold text-slate-300 mb-2 block">Columns</label>
                            <div id="columns-grid" class="grid grid-cols-2 gap-2 max-h-80 overflow-y-auto">
                                <div class="text-sm text-slate-400 col-span-2 text-center py-4">Loading columns...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Remote Modal -->
    <div id="global-remote-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50" onclick="closeGlobalRemote(event)">
        <div class="bg-gradient-to-b from-slate-800 to-slate-900 rounded-2xl shadow-2xl max-w-sm w-full mx-4 border border-slate-700" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between p-5 border-b border-slate-700 bg-slate-800/50 rounded-t-2xl">
                <h3 class="text-lg font-semibold text-slate-100">Global Remote</h3>
                <button onclick="closeGlobalRemote()" class="text-slate-400 hover:text-slate-100 transition-colors">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <div class="text-xs text-slate-400 mb-4 text-center">Controls all TVs simultaneously</div>
                
                <!-- Power Button -->
                <button onclick="sendGlobalKey('KEY_POWER')" class="remote-btn-lg bg-red-600 hover:bg-red-700 w-full mb-4">
                    <svg class="h-5 w-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728m-9.9-2.829a5 5 0 010-7.07m7.072 0a5 5 0 010 7.07M13 12a1 1 0 11-2 0 1 1 0 012 0z" />
                    </svg>
                    <span class="ml-2">Power</span>
                </button>
                
                <!-- Volume & Mute -->
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <button onclick="sendGlobalKey('KEY_VOLDOWN')" class="remote-btn-md bg-blue-600 hover:bg-blue-700 col-span-1">Vol−</button>
                    <button onclick="sendGlobalKey('KEY_MUTE')" class="remote-btn-md bg-orange-600 hover:bg-orange-700 col-span-1">
                        <svg class="h-5 w-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                        </svg>
                    </button>
                    <button onclick="sendGlobalKey('KEY_VOLUP')" class="remote-btn-md bg-blue-600 hover:bg-blue-700 col-span-1">Vol+</button>
                </div>
                
                <!-- Navigation Pad -->
                <div class="bg-slate-800/50 rounded-xl p-4 mb-4">
                    <div class="grid grid-cols-3 gap-2">
                        <div></div>
                        <button onclick="sendGlobalKey('KEY_UP')" class="remote-btn-nav bg-slate-600 hover:bg-slate-700">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7" />
                            </svg>
                        </button>
                        <div></div>
                        <button onclick="sendGlobalKey('KEY_LEFT')" class="remote-btn-nav bg-slate-600 hover:bg-slate-700">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                            </svg>
                        </button>
                        <button onclick="sendGlobalKey('KEY_ENTER')" class="remote-btn-ok bg-green-600 hover:bg-green-700">OK</button>
                        <button onclick="sendGlobalKey('KEY_RIGHT')" class="remote-btn-nav bg-slate-600 hover:bg-slate-700">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                            </svg>
                        </button>
                        <div></div>
                        <button onclick="sendGlobalKey('KEY_DOWN')" class="remote-btn-nav bg-slate-600 hover:bg-slate-700">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <div></div>
                    </div>
                </div>
                
                <!-- Function Buttons -->
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button onclick="sendGlobalKey('KEY_RETURN')" class="remote-btn-md bg-slate-600 hover:bg-slate-700">Back</button>
                    <button onclick="sendGlobalKey('KEY_HOME')" class="remote-btn-md bg-blue-600 hover:bg-blue-700">Home</button>
                    <button onclick="sendGlobalKey('KEY_MENU')" class="remote-btn-md bg-blue-600 hover:bg-blue-700">Menu</button>
                    <button onclick="sendGlobalKey('KEY_SOURCE')" class="remote-btn-md bg-purple-600 hover:bg-purple-700">Source</button>
                </div>
                
                <!-- Channel Buttons -->
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="sendGlobalKey('KEY_CHUP')" class="remote-btn-md bg-purple-600 hover:bg-purple-700">CH+</button>
                    <button onclick="sendGlobalKey('KEY_CHDOWN')" class="remote-btn-md bg-purple-600 hover:bg-purple-700">CH−</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Individual TV Remote Modal -->
    <div id="tv-remote-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50" onclick="closeRemoteModal(event)">
        <div class="bg-gradient-to-b from-slate-800 to-slate-900 rounded-2xl shadow-2xl max-w-sm w-full mx-4 border border-slate-700" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between p-5 border-b border-slate-700 bg-slate-800/50 rounded-t-2xl">
                <h3 class="text-lg font-semibold text-slate-100" id="remote-modal-title">TV Remote</h3>
                <button onclick="closeRemoteModal()" class="text-slate-400 hover:text-slate-100 transition-colors">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <!-- Power Button -->
                <button onclick="sendIndividualKey('KEY_POWER')" class="remote-btn-lg bg-red-600 hover:bg-red-700 w-full mb-4">
                    <svg class="h-5 w-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728m-9.9-2.829a5 5 0 010-7.07m7.072 0a5 5 0 010 7.07M13 12a1 1 0 11-2 0 1 1 0 012 0z" />
                    </svg>
                    <span class="ml-2">Power</span>
                </button>
                
                <!-- Volume & Mute -->
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <button onclick="sendIndividualKey('KEY_VOLDOWN')" class="remote-btn-md bg-blue-600 hover:bg-blue-700">Vol−</button>
                    <button onclick="sendIndividualKey('KEY_MUTE')" class="remote-btn-md bg-orange-600 hover:bg-orange-700">
                        <svg class="h-5 w-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                        </svg>
                    </button>
                    <button onclick="sendIndividualKey('KEY_VOLUP')" class="remote-btn-md bg-blue-600 hover:bg-blue-700">Vol+</button>
                </div>
                
                <!-- Navigation Pad -->
                <div class="bg-slate-800/50 rounded-xl p-4 mb-4">
                    <div class="grid grid-cols-3 gap-2">
                        <div></div>
                        <button onclick="sendIndividualKey('KEY_UP')" class="remote-btn-nav bg-slate-600 hover:bg-slate-700">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7" />
                            </svg>
                        </button>
                        <div></div>
                        <button onclick="sendIndividualKey('KEY_LEFT')" class="remote-btn-nav bg-slate-600 hover:bg-slate-700">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                            </svg>
                        </button>
                        <button onclick="sendIndividualKey('KEY_ENTER')" class="remote-btn-ok bg-green-600 hover:bg-green-700">OK</button>
                        <button onclick="sendIndividualKey('KEY_RIGHT')" class="remote-btn-nav bg-slate-600 hover:bg-slate-700">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                            </svg>
                        </button>
                        <div></div>
                        <button onclick="sendIndividualKey('KEY_DOWN')" class="remote-btn-nav bg-slate-600 hover:bg-slate-700">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <div></div>
                    </div>
                </div>
                
                <!-- Function Buttons -->
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button onclick="sendIndividualKey('KEY_RETURN')" class="remote-btn-md bg-slate-600 hover:bg-slate-700">Back</button>
                    <button onclick="sendIndividualKey('KEY_HOME')" class="remote-btn-md bg-blue-600 hover:bg-blue-700">Home</button>
                    <button onclick="sendIndividualKey('KEY_MENU')" class="remote-btn-md bg-blue-600 hover:bg-blue-700">Menu</button>
                    <button onclick="sendIndividualKey('KEY_SOURCE')" class="remote-btn-md bg-purple-600 hover:bg-purple-700">Source</button>
                </div>
                
                <!-- Channel Buttons -->
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button onclick="sendIndividualKey('KEY_CHUP')" class="remote-btn-md bg-purple-600 hover:bg-purple-700">CH+</button>
                    <button onclick="sendIndividualKey('KEY_CHDOWN')" class="remote-btn-md bg-purple-600 hover:bg-purple-700">CH−</button>
                </div>
                
                <!-- Playback Controls -->
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="sendIndividualKey('KEY_PLAY')" class="remote-btn-md bg-green-600 hover:bg-green-700">
                        <svg class="h-5 w-5 inline-block" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button onclick="sendIndividualKey('KEY_PAUSE')" class="remote-btn-md bg-yellow-600 hover:bg-yellow-700">
                        <svg class="h-5 w-5 inline-block" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                        </svg>
                    </button>
                    <button onclick="sendIndividualKey('KEY_STOP')" class="remote-btn-md bg-red-600 hover:bg-red-700">
                        <svg class="h-5 w-5 inline-block" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 6h12v12H6z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-auto bg-slate-900 border-t border-slate-800">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex items-center justify-between">
                <p class="text-sm text-slate-500">
                    &copy; 2026 TV Control Panel. Built with FastAPI & Tailwind CSS.
                </p>
                <div class="flex space-x-4 text-sm text-slate-500">
                    <a href="https://github.com" class="hover:text-slate-300 transition-colors">GitHub</a>
                    <a href="/api/tvs" class="hover:text-slate-300 transition-colors">API</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="/legacy-static/js/index.js"></script>

    <noscript>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="bg-red-900/30 border border-red-800 rounded-lg p-4">
                <p class="text-red-400">JavaScript is required for this page to function.</p>
            </div>
        </div>
    </noscript>
</body>

</html>
